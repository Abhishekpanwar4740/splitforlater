server:
  port: 8082
  error:
    include-message: always

spring:
  application:
    name: group-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:splitforlater}
    username: ${DB_USER:splituser}
    password: ${DB_PASS:splitpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}

  # 2. Redisson-specific overrides
  # The starter 4.x looks for this prefix to configure the RedissonClient
  redis:
    redisson:
      config:
        singleServerConfig:
          address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
          password: "${REDIS_PASSWORD:redis_pass}"
          connectionPoolSize: 64
          connectionMinimumIdleSize: 24
# SpringDoc OpenAPI 3.0 Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Groups APIs logically in the UI
    tags-sorter: alpha
    operations-sorter: alpha
  # Customizing the OpenAPI info via YAML (can also be done in a @Configuration class)
  openapi:
    info:
      title: Group & Member Service API
      version: 1.0.0
      description: API for managing Splitwise groups and memberships with Redisson-backed locking.
    components:
      securitySchemes:
        UserIdHeader:
          type: apiKey
          in: header
          name: X-User-Id
    security:
      - UserIdHeader: []

# Logging for Datadog-style observability
logging:
  level:
    root: INFO
    com.splitwise.groups: DEBUG
    org.redisson: WARN