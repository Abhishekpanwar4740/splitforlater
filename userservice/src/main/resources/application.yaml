spring:
  application:
    name: user-identity-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:splitforlater}
    username: ${DB_USER:splituser}
    password: ${DB_PASS:splitpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Spring Session using Redisson
  # Note: To use Redisson for sessions, ensure you have 'redisson-spring-session-starter'
  session:
    store-type: redis
    redis:
      flush-mode: on_save
      namespace: splitwise:session

  # Redisson Configuration (Replaces standard spring.data.redis)
  # This matches the high-scale requirements in your resume
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}


# SpringDoc OpenAPI 3.0 Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Groups APIs logically in the UI
    tags-sorter: alpha
    operations-sorter: alpha
  # Customizing the OpenAPI info via YAML (can also be done in a @Configuration class)
  openapi:
    info:
      title: User Service API
      version: 1.0.0
      description: API for managing Splitwise users.
    components:
      securitySchemes:
        UserIdHeader:
          type: apiKey
          in: header
          name: X-User-Id
    security:
      - UserIdHeader: []

# Server Port configuration for the User Service
server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

# Custom logging to match your Datadog monitoring experience
logging:
  level:
    root: INFO
    com.splitwise.user: DEBUG
    org.redisson: INFO