server:
  port: 8083

spring:
  application:
    name: expense-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/splitwise_expenses
    username: ${DB_USER:postgres}
    password: ${DB_PASS:password}
  rabbitmq:
    addresses: ${AWS_RABBITMQ_ENDPOINT}
    username: ${AWS_RABBITMQ_USER}
    password: ${AWS_RABBITMQ_PASSWORD}
    ssl:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update

# Redisson for Distributed Locking on Group ID
redisson:
  address: "redis://${REDIS_HOST:localhost}:6379"

springdoc:
  swagger-ui:
    path: /swagger-ui.html